name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC
  workflow_dispatch:       # Allow manual triggers

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to push github_data.json.gz back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements.txt'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Execute pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pipeline.main --window 90 --output github_data.json.gz

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github_data.json.gz
          # Exit 0 if nothing changed (no new data)
          git diff --cached --quiet && echo "No data changes, skipping commit." && exit 0
          git commit -m "chore: nightly refresh of github metrics data [skip ci]"
          git push
